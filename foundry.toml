[profile.default]
src = 'code/src'
test = 'code/tests'
script = 'deployment/scripts'
out = 'out'
libs = ['lib']
remappings = [
    '@openzeppelin/contracts=lib/openzeppelin-contracts/contracts',
    'src/=code/src/',
    "bonus=bonus/src"
]
solc_version = '0.8.20'
optimizer = true
optimizer_runs = 200
verbosity = 1

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"